# Local development infrastructure
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Provides PostgreSQL + MinIO (S3-compatible) for local development.
# App servers (API, Landing, Dashboard) run natively via ./scripts/dev.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: tene-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tene
      POSTGRES_USER: tene_admin
      POSTGRES_PASSWORD: localdev123
    volumes:
      - tene-pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tene_admin -d tene"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tene-s3
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - tene-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: tene-s3-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/tene-vault-local;
        mc anonymous set download local/tene-vault-local;
        echo 'Bucket tene-vault-local created';
      "

volumes:
  tene-pgdata:
  tene-minio:
