version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tene
    main: ./cmd/tene
    binary: tene
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: tene-archive
    builds:
      - tene
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: tomo-kay
    name: tene
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

# S3 업로드
blobs:
  - provider: s3
    bucket: tene-releases
    region: ap-northeast-2
    directory: "v{{.Version}}"
    extra_files:
      - glob: dist/checksums.txt
