version: 2

before:
  hooks:
    - go mod tidy
    # Shell completions for Homebrew / packaged shells
    - mkdir -p completions
    - sh -c "go run ./cmd/tene completion bash > completions/tene.bash"
    - sh -c "go run ./cmd/tene completion zsh > completions/_tene"
    - sh -c "go run ./cmd/tene completion fish > completions/tene.fish"
    # Man page generation (written to manpages/tene.1)
    - mkdir -p manpages
    - sh -c "go run ./scripts/gen-manpage.go"

builds:
  - id: tene
    main: ./cmd/tene
    binary: tene
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: tene-archive
    ids:
      - tene
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - src: completions/*
        dst: completions
        strip_parent: true
        info:
          mode: 0644
      - src: manpages/*
        dst: manpages
        strip_parent: true
        info:
          mode: 0644
      - LICENSE
      - README.md
      - SECURITY.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: tene-ai
    name: tene
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

# Homebrew tap — currently disabled (2026-04-24).
#
# Publishing to a Homebrew tap requires:
#   1. A public GitHub repo `tene-ai/homebrew-tene` to exist.
#   2. A fine-grained PAT with `Contents: Read/Write` on that repo,
#      stored as the `HOMEBREW_TAP_GITHUB_TOKEN` secret on this repo
#      (tene-ai/tene).
#
# Neither is set up yet, and three consecutive stable releases
# (v1.0.5, v1.0.6, v1.0.7) failed on this block with a 401 that
# skipped the downstream `Update LATEST_VERSION` step and left
# install.sh pointing at a stale version.
#
# To re-enable:
#   1. gh repo create tene-ai/homebrew-tene --public --license MIT --add-readme
#   2. Create a fine-grained PAT (Contents: Read/Write on the tap repo),
#      then: gh secret set HOMEBREW_TAP_GITHUB_TOKEN --repo tene-ai/tene
#   3. Uncomment the block below and keep `skip_upload: false` so stable
#      releases always publish the formula.
#
# brews:
#   - name: tene
#     homepage: "https://tene.sh"
#     description: "Local-first encrypted secret manager CLI for AI-safe developer workflows"
#     license: "MIT"
#     repository:
#       owner: tene-ai
#       name: homebrew-tene
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     directory: Formula
#     commit_author:
#       name: goreleaserbot
#       email: bot@tene.sh
#     commit_msg_template: "chore(tap): bump tene to {{ .Tag }}"
#     skip_upload: false
#     install: |
#       bin.install "tene"
#       bash_completion.install "completions/tene.bash" => "tene"
#       zsh_completion.install "completions/_tene"
#       fish_completion.install "completions/tene.fish"
#       man1.install "manpages/tene.1"
#     test: |
#       system "#{bin}/tene", "version"
#     caveats: |
#       Get started:
#         tene init
#
#       Documentation:
#         https://github.com/tene-ai/tene#readme
#
#       For AI agents using this project:
#         https://tene.sh/llms.txt

# Docker images published to GitHub Container Registry (GHCR).
# Multi-arch via docker_manifests below.
dockers:
  - image_templates:
      - "ghcr.io/tene-ai/tene:{{ .Tag }}-amd64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}-amd64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/tene-ai/tene:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/tene-ai/tene"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/tene-ai/tene:{{ .Tag }}-arm64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}-arm64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/tene-ai/tene:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/tene-ai/tene"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/tene-ai/tene:{{ .Tag }}"
    image_templates:
      - "ghcr.io/tene-ai/tene:{{ .Tag }}-amd64"
      - "ghcr.io/tene-ai/tene:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/tene-ai/tene:v{{ .Major }}"
    image_templates:
      - "ghcr.io/tene-ai/tene:v{{ .Major }}-amd64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}-arm64"
  - name_template: "ghcr.io/tene-ai/tene:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/tene-ai/tene:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/tene-ai/tene:v{{ .Major }}.{{ .Minor }}-arm64"
  - name_template: "ghcr.io/tene-ai/tene:latest"
    image_templates:
      - "ghcr.io/tene-ai/tene:latest-amd64"
      - "ghcr.io/tene-ai/tene:latest-arm64"

# S3 upload (existing; legacy curl|sh install path)
blobs:
  - provider: s3
    bucket: tene-releases
    region: ap-northeast-2
    directory: "v{{.Version}}"
    extra_files:
      - glob: dist/checksums.txt
