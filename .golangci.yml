version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - revive
    - bodyclose
    - noctx
    - misspell
    - exhaustive

linters-settings:
  errcheck:
    check-type-assertions: true
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G104
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: cmd/
      linters:
        - revive
