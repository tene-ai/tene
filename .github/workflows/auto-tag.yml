name: Auto Tag & Release

on:
  push:
    branches: [staging, main]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Get latest stable tag and latest rc tag separately
          # (git v:refname sorts rc AFTER stable, so we can't just take head -1)
          LATEST_STABLE=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST_RC=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$' | head -1)

          echo "Latest stable: $LATEST_STABLE"
          echo "Latest rc: $LATEST_RC"

          if [ -z "$LATEST_STABLE" ]; then
            LATEST_STABLE="v0.0.0"
          fi

          STABLE_VER="${LATEST_STABLE#v}"
          IFS='.' read -r S_MAJOR S_MINOR S_PATCH <<< "$STABLE_VER"

          if [ "$BRANCH" = "staging" ]; then
            if [ -n "$LATEST_RC" ]; then
              RC_VER="${LATEST_RC#v}"
              # Extract base and rc number: v1.0.1-rc2 → 1.0.1 / 2
              RC_BASE="${RC_VER%-rc*}"
              RC_NUM="${RC_VER##*-rc}"

              # Check if rc is for a version AFTER the latest stable
              IFS='.' read -r R_MAJOR R_MINOR R_PATCH <<< "$RC_BASE"

              if [ "$R_MAJOR" -gt "$S_MAJOR" ] || \
                 [ "$R_MAJOR" -eq "$S_MAJOR" -a "$R_MINOR" -gt "$S_MINOR" ] || \
                 [ "$R_MAJOR" -eq "$S_MAJOR" -a "$R_MINOR" -eq "$S_MINOR" -a "$R_PATCH" -gt "$S_PATCH" ]; then
                # RC is for a newer version: increment rc number
                NEW_VERSION="v${RC_BASE}-rc$((RC_NUM + 1))"
              else
                # RC is for same or older version: start new patch rc
                NEW_VERSION="v${S_MAJOR}.${S_MINOR}.$((S_PATCH + 1))-rc1"
              fi
            else
              # No rc exists: start new patch rc from stable
              NEW_VERSION="v${S_MAJOR}.${S_MINOR}.$((S_PATCH + 1))-rc1"
            fi

          elif [ "$BRANCH" = "main" ]; then
            if [ -n "$LATEST_RC" ]; then
              RC_VER="${LATEST_RC#v}"
              RC_BASE="${RC_VER%-rc*}"
              IFS='.' read -r R_MAJOR R_MINOR R_PATCH <<< "$RC_BASE"

              if [ "$R_MAJOR" -gt "$S_MAJOR" ] || \
                 [ "$R_MAJOR" -eq "$S_MAJOR" -a "$R_MINOR" -gt "$S_MINOR" ] || \
                 [ "$R_MAJOR" -eq "$S_MAJOR" -a "$R_MINOR" -eq "$S_MINOR" -a "$R_PATCH" -gt "$S_PATCH" ]; then
                # Promote rc to stable
                NEW_VERSION="v${RC_BASE}"
              else
                # RC is stale, increment stable patch
                NEW_VERSION="v${S_MAJOR}.${S_MINOR}.$((S_PATCH + 1))"
              fi
            else
              # No rc: increment stable patch
              NEW_VERSION="v${S_MAJOR}.${S_MINOR}.$((S_PATCH + 1))"
            fi
          fi

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Tag ${{ steps.version.outputs.version }} created. GoReleaser (release.yml) will handle the GitHub Release."
