name: Dashboard

on:
  push:
    branches: [main, staging]
    paths:
      - "apps/dashboard/**"
  pull_request:
    branches: [main, staging]
    paths:
      - "apps/dashboard/**"

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/dashboard

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.tene.sh

  # Vercel handles deployment automatically via Git integration.
  # Setup: Connect the GitHub repo to Vercel with these settings:
  #   - Framework: Next.js
  #   - Root Directory: apps/dashboard
  #   - Build Command: npm run build
  #   - Output Directory: .next
  #   - Environment Variable: NEXT_PUBLIC_API_URL=https://api.tene.sh
  #   - Domain: app.tene.sh
  #
  # Vercel deploys automatically on push to main (production)
  # and creates preview deployments for PRs.
